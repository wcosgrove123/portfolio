<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="robots" content="noindex, nofollow">
  <title>Fair Intel</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f1117;
      --card: #181a22;
      --border: #2a2d38;
      --text: #e8e6e1;
      --dim: #7a7d88;
      --coral: #e67b5b;
      --gold: #facc15;
      --green: #4ade80;
      --blue: #60a5fa;
      --orange: #fb923c;
    }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      padding: 16px;
      padding-bottom: 80px;
    }
    h1 {
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 11px;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 20px;
    }
    .tier-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      padding: 6px 0;
      margin-top: 20px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .tier-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 10px;
      overflow: hidden;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .card-header {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .school-name {
      font-size: 15px;
      font-weight: 700;
    }
    .school-meta {
      font-size: 11px;
      color: var(--dim);
      margin-top: 2px;
    }
    .vacancy-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 6px;
      white-space: nowrap;
    }
    .card-body {
      display: none;
      padding: 0 16px 16px;
      border-top: 1px solid var(--border);
    }
    .card.open .card-body {
      display: block;
    }
    .section-label {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--coral);
      margin-top: 14px;
      margin-bottom: 6px;
    }
    .opener {
      font-style: italic;
      font-size: 13px;
      color: var(--text);
      line-height: 1.6;
      padding: 10px 12px;
      background: rgba(230,123,91,0.06);
      border-left: 2px solid var(--coral);
      border-radius: 4px;
    }
    .hook {
      font-size: 12px;
      color: var(--gold);
      line-height: 1.5;
      padding: 8px 10px;
      background: rgba(250,204,21,0.05);
      border-radius: 6px;
    }
    ul {
      list-style: none;
      padding: 0;
    }
    ul li {
      font-size: 12px;
      color: var(--text);
      padding: 4px 0;
      padding-left: 14px;
      position: relative;
      line-height: 1.5;
    }
    ul li::before {
      content: '';
      position: absolute;
      left: 0;
      top: 10px;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--dim);
    }
    ul.questions li::before { background: var(--blue); }
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-top: 8px;
    }
    .info-item {
      font-size: 11px;
      color: var(--dim);
    }
    .info-item span {
      color: var(--text);
      font-weight: 600;
    }
    .programs {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 6px;
    }
    .programs .tag {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      color: var(--dim);
      border: 1px solid var(--border);
    }
    .back-top {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    /* Flow Map */
    .flow-section {
      margin-bottom: 28px;
    }
    .flow-select {
      width: 100%;
      padding: 10px 14px;
      border-radius: 10px;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 14px;
      -webkit-appearance: none;
      appearance: none;
      background-image: url("data:image/svg+xml,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1.5L6 6.5L11 1.5' stroke='%237a7d88' stroke-width='2' stroke-linecap='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 14px center;
      padding-right: 36px;
    }
    .flow-steps {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .flow-step {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 14px 16px;
      position: relative;
    }
    .flow-step:first-child { border-radius: 12px 12px 0 0; }
    .flow-step:last-child { border-radius: 0 0 12px 12px; }
    .flow-phase {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    .flow-phase.hook { color: var(--coral); }
    .flow-phase.bridge { color: var(--gold); }
    .flow-phase.close { color: var(--green); }
    .flow-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }
    .flow-text {
      font-size: 12px;
      color: rgba(232,230,225,0.75);
      line-height: 1.6;
      white-space: pre-line;
    }
    .flow-connector {
      width: 2px;
      height: 8px;
      background: var(--border);
      margin-left: 20px;
    }
    .flow-branch {
      display: flex;
      flex-direction: column;
      gap: 2px;
      margin-top: 2px;
      padding-left: 16px;
      border-left: 2px solid var(--border);
      margin-left: 8px;
    }
    .flow-branch .flow-step {
      border-radius: 10px;
      background: rgba(255,255,255,0.015);
    }
    .tab-bar {
      display: flex;
      gap: 0;
      margin-bottom: 20px;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .tab {
      flex: 1;
      padding: 10px 0;
      text-align: center;
      font-size: 12px;
      font-weight: 700;
      background: var(--card);
      color: var(--dim);
      border: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .tab.active {
      background: var(--coral);
      color: #fff;
    }
    .view { display: none; }
    .view.active { display: block; }

    /* School profile */
    .profile {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }
    .profile-block {
      margin-bottom: 14px;
    }
    .profile-block h4 {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #5abfb7;
      margin-bottom: 6px;
    }
    .profile-block p {
      font-size: 12px;
      color: rgba(232,230,225,0.8);
      line-height: 1.6;
    }

    /* Questions section */
    .q-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 10px;
    }
    .q-text {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.5;
      margin-bottom: 6px;
    }
    .q-why {
      font-size: 11px;
      color: var(--dim);
      line-height: 1.5;
    }
    .q-category {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 20px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #5abfb7;
    }
    .q-category::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
  </style>
</head>
<body>

<p class="subtitle">DCPS Hiring Fair &mdash; April 9, 2026</p>

<div class="tab-bar">

    <div id="flow-steps" class="flow-steps"></div>

</div>

</div>

<div id="questions-view" class="view">

</div>

<button class="back-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">&uarr;</button>

    questionsToAsk: ["Any SS openings?"],
    openingLine: "Hi, I'm Wil Cosgrove \u2014 any SS openings for next year?"
  },
  {
    school: "Sousa MS", principal: "Brittany Green", ward: 7, enrollment: 223, grades: "6-8",
    tier: 2, vacancy: "No SS vacancy listed", vacancyCount: 0,
    questionsToAsk: ["Any SS openings?"],
    openingLine: "Hi, I'm Wil Cosgrove \u2014 any SS openings for next year?"
  },
];

const tierConfig = {
  1:   { label: 'PRIORITY \u2014 SS VACANCY AT FAIR', color: '#e67b5b' },
  1.5: { label: 'MIDDLE SCHOOLS \u2014 VACANCY AT FAIR', color: '#fb923c' },
  2:   { label: 'AT FAIR \u2014 NO SS VACANCY (QUICK INTEL)', color: '#facc15' },
};

function render() {
  const container = document.getElementById('cards');
  let html = '';

  [1, 1.5, 2].forEach(tier => {
    const tierSchools = schools.filter(s => s.tier === tier);
    if (!tierSchools.length) return;
    const cfg = tierConfig[tier];
    html += `<div class="tier-label" style="color:${cfg.color}">${cfg.label}</div>`;

    tierSchools.forEach((s, i) => {
      const globalIdx = schools.indexOf(s);
      const badgeColor = s.vacancyCount > 0 ? 'rgba(74,222,128,0.15)' : 'rgba(250,204,21,0.1)';
      const badgeText = s.vacancyCount > 0 ? `${s.vacancyCount} opening${s.vacancyCount > 1 ? 's' : ''}` : 'No vacancy';
      const badgeTextColor = s.vacancyCount > 0 ? '#4ade80' : '#facc15';

      html += `<div class="card" onclick="toggle(this)" id="card-${globalIdx}">
        <div class="card-header">
          <div>
            <div class="school-name">${s.school}</div>
            <div class="school-meta">${s.principal} &bull; Ward ${s.ward}${s.enrollment ? ' &bull; ' + s.enrollment + ' students' : ''}</div>
          </div>
          <div class="vacancy-badge" style="background:${badgeColor};color:${badgeText}">${badgeText}</div>
        </div>
        <div class="card-body">
          ${s.openingLine ? `<div class="section-label">Opening Line</div><div class="opener">"${s.openingLine.replace(/^"/, '').replace(/"$/, '')}"</div>` : ''}
          ${s.hook ? `<div class="section-label">Your Edge</div><div class="hook">${s.hook}</div>` : ''}
          ${s.talkingPoints?.length ? `<div class="section-label">Talking Points</div><ul>${s.talkingPoints.map(t => `<li>${t}</li>`).join('')}</ul>` : ''}
          ${s.questionsToAsk?.length ? `<div class="section-label">Questions to Ask</div><ul class="questions">${s.questionsToAsk.map(q => `<li>${q}</li>`).join('')}</ul>` : ''}
          ${s.keyPrograms?.length ? `<div class="section-label">Key Programs</div><div class="programs">${s.keyPrograms.map(p => `<span class="tag">${p}</span>`).join('')}</div>` : ''}
          ${s.demographics || s.atRisk || s.ell ? `
            <div class="info-grid">
              ${s.demographics ? `<div class="info-item"><span>${s.demographics}</span></div>` : ''}
              ${s.atRisk ? `<div class="info-item">At-risk: <span>${s.atRisk}</span></div>` : ''}
              ${s.ell ? `<div class="info-item">ELL: <span>${s.ell}</span></div>` : ''}
              ${s.hasPool ? `<div class="info-item"><span>Has pool</span></div>` : ''}
            </div>
          ` : ''}
          ${s.profile ? `
            <div class="profile">
              <div class="profile-block"><h4>Mission & Identity</h4><p>${s.profile.mission}</p></div>
              <div class="profile-block"><h4>Social Studies Program</h4><p>${s.profile.ssInfo}</p></div>
              <div class="profile-block"><h4>Curriculum & Instruction</h4><p>${s.profile.curriculum}</p></div>
              <div class="profile-block"><h4>School Culture</h4><p>${s.profile.culture}</p></div>
              <div class="profile-block"><h4>About the Principal</h4><p>${s.profile.principalNote}</p></div>
            </div>
          ` : ''}
        </div>
      </div>`;
    });
  });

  container.innerHTML = html;
}

function toggle(el) {
  el.classList.toggle('open');
}

// ── TAB SWITCHING ──
const tabMap = ['flow', 'schools', 'questions'];
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', tabMap[i] === tab);
  });
  tabMap.forEach(t => {
    document.getElementById(t + '-view').classList.toggle('active', t === tab);
  });
  window.scrollTo({ top: 0 });
}

// ── QUESTIONS TO REHEARSE ──
const questions = [
  { cat: "About Their SS Program", items: [
    { q: "What does your social studies program look like right now?", why: "Open-ended, lets them talk. Shows genuine interest." },
    { q: "What courses would this position cover?", why: "Practical. You need to know if it's US History, World, Gov, etc." },
    { q: "What does your department value most in how social studies is taught here?", why: "Gets at their philosophy. Tells you if you're a fit." },
    { q: "Is there a curriculum or framework the SS department follows, or do teachers have room to design their own units?", why: "Tells you how much creative freedom you'd have." },
  ]},
  { cat: "About Teaching There", items: [
    { q: "What kind of teacher tends to do really well here?", why: "Reveals culture. Their answer tells you what they prioritize." },
    { q: "What's the biggest challenge your teachers face, and what support do they get?", why: "Shows maturity. You're asking about the real job, not just the brochure." },
    { q: "Are there interdisciplinary efforts here, like connecting social studies with other departments or programs?", why: "Signals you think beyond your silo. Connects to your curriculum design background." },
    { q: "How does the school support new teachers in their first year?", why: "Practical and smart. Shows you're thinking about thriving long-term." },
  ]},
  { cat: "About the School", items: [
    { q: "What are you most proud of about this school right now?", why: "People love talking about what's going well. Builds rapport." },
    { q: "What's the relationship like between teachers and the community here?", why: "You're a D.C. resident who coaches and volunteers. This is your strength." },
    { q: "Is there anything happening next year that you're excited about?", why: "Forward-looking. Shows you're thinking about being part of the future." },
  ]},
  { cat: "Closing / Next Steps", items: [
    { q: "Is there a next step I can take after today?", why: "Direct. Closes the conversation with intent." },
    { q: "Could I come visit the school and see a class in action?", why: "Shows commitment. Most candidates won't ask this." },
    { q: "What's the best way to follow up with you?", why: "Gets their contact info. Essential for the thank-you email." },
  ]},
];

function renderQuestions() {
  const container = document.getElementById('questions');
  let html = '';
  questions.forEach(section => {
    html += `<div class="q-category">${section.cat}</div>`;
    section.items.forEach(item => {
      html += `<div class="q-card">
        <div class="q-text">"${item.q}"</div>
        <div class="q-why">${item.why}</div>
      </div>`;
    });
  });
  container.innerHTML = html;
}

// ── FLOW MAP ──
// Populate school select
const select = document.getElementById('school-select');
schools.filter(s => s.tier <= 2).forEach((s, i) => {
  const opt = document.createElement('option');
  opt.value = i;
  const tag = s.vacancyCount > 0 ? ` (${s.vacancyCount} opening${s.vacancyCount > 1 ? 's' : ''})` : ' (no vacancy)';
  opt.textContent = s.school + tag;
  select.appendChild(opt);
});

function getFlowSteps(s) {
  if (!s) return getGenericFlow();

  const hasVacancy = s.vacancyCount > 0;
  const schoolName = s.school;
  const specific = s.talkingPoints?.[0] || '';
  const question = s.questionsToAsk?.[0] || "What's the next step I can take after today?";

  return [
    {
      phase: 'hook', label: 'Approach',
      text: s.openingLine
    },
    {
      phase: 'hook', label: 'Philosophy Hook',
      text: "\"I believe social studies should be something students feel part of, not just something that happened.\"\n\nStop. Let it breathe. Wait for their response."
    },
    {
      phase: 'bridge', label: 'They say: "Tell me more"',
      text: `"I student taught AP US History and AP Government at Bethesda-Chevy Chase. I designed full units and led all five classes independently. I'm finishing my masters in curriculum design at GW and I hold my OSSE credential."\n\n${s.hook ? 'Then weave in: ' + specific : ''}`
    },
    {
      phase: 'bridge', label: 'They say: "What subject?"',
      text: `"Social studies, 7-12. OSSE certified. I taught AP US History and AP Government at BCC."\n\nThen pivot: "${question}"`
    },
    {
      phase: 'bridge', label: 'They say: "We\'re full"',
      text: hasVacancy
        ? `"I saw there ${s.vacancyCount > 1 ? 'were ' + s.vacancyCount + ' SS openings' : 'was an SS opening'} listed for ${schoolName} — is that still available?"\n\nIf truly full: "Could I leave my resume in case something opens up? I'd love to stay on your radar."`
        : `"Totally understand. Could I leave my resume in case something opens up? I'd love to stay on your radar."\n\nGet their card. Move on gracefully.`
    },
    {
      phase: 'close', label: 'Conversation Deepens',
      text: `They're asking about your background and plans. This is the green light.\n\n${s.hasPool ? 'Share the swimming/coaching story — they have a pool.' : 'Share the Swim Safe / coaching story.'}\nMention: ${s.talkingPoints?.slice(0, 2).join('; ') || 'your teaching philosophy'}\n\nAsk THEM questions. Listen more than you talk.`
    },
    {
      phase: 'close', label: 'The Close',
      text: `"I'd love to come see ${schoolName}. Could we set up a visit or a follow-up conversation?"\n\nGet their card. Write down what you discussed. Send a thank-you email TODAY.`
    }
  ];
}

function getGenericFlow() {
  return [
    { phase: 'hook', label: 'Approach', text: "Walk up, smile, make eye contact.\n\"Hi, I'm Wil Cosgrove. I've had my eye on [school] because [specific reason].\"" },
    { phase: 'hook', label: 'Philosophy Hook', text: "\"I believe social studies should be something students feel part of, not just something that happened.\"\n\nStop. Let it breathe. Wait for their response." },
    { phase: 'bridge', label: 'They say: "Tell me more"', text: "\"I student taught AP US History and AP Government at BCC, designed full units, and led five classes independently. I'm finishing my masters in curriculum design at GW and I hold my OSSE credential.\"" },
    { phase: 'bridge', label: 'They say: "What subject?"', text: "\"Social studies, 7-12. OSSE certified. I taught AP US History and AP Government at BCC.\"\n\nThen pivot back: \"What are you looking for in your SS department?\"" },
    { phase: 'bridge', label: 'They say: "We\'re full"', text: "\"Totally understand. Could I leave my resume in case something opens up? I'd love to stay on your radar.\"\n\nGet their card. Move on gracefully." },
    { phase: 'close', label: 'Conversation Deepens', text: "They're asking about your background, your future plans. This is the green light.\n\nShare the swimming/coaching story.\nAsk THEM questions.\nListen more than you talk." },
    { phase: 'close', label: 'The Close', text: "\"I'd love to come see your school. Could we set up a visit or a follow-up conversation?\"\n\nGet their card. Write down what you discussed. Send a thank-you email TODAY." },
  ];
}

function updateFlow() {
  const idx = select.value;
  const s = idx !== '' ? schools[parseInt(idx)] : null;
  const steps = getFlowSteps(s);
  const container = document.getElementById('flow-steps');

  container.innerHTML = steps.map(step => `
    <div class="flow-step">
      <div class="flow-phase ${step.phase}">${step.phase === 'hook' ? 'HOOK' : step.phase === 'bridge' ? 'BRIDGE' : 'CLOSE'}</div>
      <div class="flow-label">${step.label}</div>
      <div class="flow-text">${step.text}</div>
    </div>
  `).join('');
}

// Initialize
updateFlow();
render();
renderQuestions();
</script>
</body>
</html>
